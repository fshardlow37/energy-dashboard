name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: node scripts/bundle.js
      - run: npx electron-builder --win portable --config electron-builder.config.js
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/energysrc.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: node scripts/bundle.js
      - run: npx electron-builder --mac --config electron-builder.config.js
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - uses: actions/upload-artifact@v4
        with:
          name: mac
          path: |
            dist/energysrc.dmg
            dist/energysrc-*.zip

  release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: windows
          path: artifacts/
      - uses: actions/download-artifact@v4
        with:
          name: mac
          path: artifacts/
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
