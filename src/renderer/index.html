<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline'; connect-src https://api.carbonintensity.org.uk https://data.elexon.co.uk https://www.smard.de https://api.eia.gov;">
  <title>energysrc</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="titlebar">
    <span id="version"></span>
    <select id="country-select"></select>
    <button id="close-btn">&times;</button>
  </div>
  <div id="app">
    <div id="demand-container">
      <canvas id="demand-chart"></canvas>
    </div>
    <div id="mix-container">
      <canvas id="mix-chart"></canvas>
    </div>
    <div id="tooltip" class="tooltip hidden"></div>
    <div id="loading" class="loading hidden"></div>
  </div>
  <div id="api-key-modal" class="modal hidden">
    <div class="modal-content">
      <p id="api-key-label">This data source requires a free API key.</p>
      <input id="api-key-input" type="text" placeholder="Enter API key" spellcheck="false">
      <div class="modal-buttons">
        <button id="api-key-save">Save</button>
        <button id="api-key-cancel">Cancel</button>
      </div>
    </div>
  </div>
  <script src="bundle.js"></script>
</body>
</html>
